<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #383838;
      --border-color: #4a4a4a;
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --accent: #18a957;
      --accent-hover: #1fc263;
      --error: #f24822;
      --warning: #f5a623;
      --info: #0d99ff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100%;
      display: flex;
      flex-direction: column;
      user-select: none;
      min-width: 320px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-weight: 600;
      font-size: 12px;
      color: var(--text-primary);
    }

    .version {
      font-size: 9px;
      color: var(--text-muted);
      background: var(--bg-tertiary);
      padding: 2px 5px;
      border-radius: 3px;
    }

    /* Connection Section */
    .connection-section {
      padding: 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .connection-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .connection-row:last-child {
      margin-bottom: 0;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-indicator.loading {
      background: var(--warning);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.connected {
      background: var(--accent);
      box-shadow: 0 0 6px rgba(24, 169, 87, 0.6);
      animation: glow 2s ease-in-out infinite;
    }

    .status-indicator.error {
      background: var(--error);
    }

    .status-indicator.disconnected {
      background: var(--text-muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px rgba(24, 169, 87, 0.4); }
      50% { box-shadow: 0 0 8px rgba(24, 169, 87, 0.8); }
    }

    .status-label {
      color: var(--text-secondary);
      min-width: 60px;
    }

    .status-value {
      color: var(--text-primary);
      font-weight: 500;
    }

    .port-select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .port-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: var(--border-color);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-danger {
      background: transparent;
      border-color: var(--error);
      color: var(--error);
    }

    .btn-danger:hover {
      background: var(--error);
      color: white;
    }

    /* Actions Section */
    .actions-section {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .actions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .action-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-btn .icon {
      font-size: 12px;
    }

    /* Code Input Section */
    .code-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .code-input {
      flex: 1;
      background: var(--bg-primary);
      border: none;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
      font-size: 10px;
      padding: 8px 12px;
      resize: none;
      line-height: 1.5;
    }

    .code-input:focus {
      outline: none;
    }

    .code-input::placeholder {
      color: var(--text-muted);
    }

    /* Logs Section */
    .logs-section {
      height: 100px;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border-color);
    }

    .logs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .logs-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 12px;
      background: var(--bg-primary);
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, monospace;
      font-size: 9px;
      line-height: 1.6;
    }

    .log-entry {
      display: flex;
      gap: 6px;
      margin-bottom: 2px;
    }

    .log-time {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .log-message {
      color: var(--text-secondary);
    }

    .log-message.success {
      color: var(--accent);
    }

    .log-message.error {
      color: var(--error);
    }

    .log-message.info {
      color: var(--info);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      font-size: 9px;
      color: var(--text-muted);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Light theme */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f5;
        --bg-tertiary: #ebebeb;
        --border-color: #e0e0e0;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --text-muted: #999999;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">Desktop Bridge</span>
      <span class="version">v1.4.0</span>
    </div>
    <div class="status-indicator disconnected" id="main-status"></div>
  </div>

  <!-- Connection Section -->
  <div class="connection-section">
    <div class="connection-row">
      <span class="status-label">Status:</span>
      <span class="status-value" id="connection-status">Disconnected</span>
      <div style="flex: 1"></div>
      <select class="port-select" id="port-select">
        <option value="9223">Port 9223</option>
        <option value="9224">Port 9224</option>
        <option value="9225">Port 9225</option>
        <option value="9226">Port 9226</option>
        <option value="9227">Port 9227</option>
        <option value="9228">Port 9228</option>
        <option value="9229">Port 9229</option>
        <option value="9230">Port 9230</option>
        <option value="9231">Port 9231</option>
        <option value="9232">Port 9232</option>
      </select>
    </div>
    <div class="connection-row">
      <span class="status-label">Server:</span>
      <span class="status-value" id="server-info">Not connected</span>
      <div style="flex: 1"></div>
      <button class="btn" id="scan-btn">Scan</button>
      <button class="btn btn-primary" id="connect-btn">Connect</button>
    </div>
  </div>

  <!-- Actions Section -->
  <div class="actions-section">
    <div class="section-title">Quick Actions</div>
    <div class="actions-grid">
      <button class="action-btn" id="btn-execute" disabled>
        <span class="icon">▶</span>
        <span>Execute Code</span>
      </button>
      <button class="action-btn" id="btn-refresh" disabled>
        <span class="icon">↻</span>
        <span>Refresh Variables</span>
      </button>
      <button class="action-btn" id="btn-components" disabled>
        <span class="icon">◇</span>
        <span>Get Components</span>
      </button>
      <button class="action-btn" id="btn-screenshot" disabled>
        <span class="icon">◉</span>
        <span>Screenshot</span>
      </button>
      <button class="action-btn" id="btn-clear">
        <span class="icon">⌫</span>
        <span>Clear Logs</span>
      </button>
      <button class="action-btn btn-danger" id="btn-disconnect" disabled>
        <span class="icon">✕</span>
        <span>Disconnect</span>
      </button>
    </div>
  </div>

  <!-- Code Input Section -->
  <div class="code-section">
    <div class="code-header">
      <span class="section-title">Code Input (Figma Plugin API)</span>
      <button class="btn btn-primary" id="btn-run-code" disabled>Run</button>
    </div>
    <textarea class="code-input" id="code-input" placeholder="// Enter Figma Plugin API code here...
// Example:
// const frame = figma.createFrame();
// frame.name = 'My Frame';
// frame.resize(200, 200);
// figma.currentPage.appendChild(frame);
// return { id: frame.id, name: frame.name };"></textarea>
  </div>

  <!-- Logs Section -->
  <div class="logs-section">
    <div class="logs-header">
      <span class="section-title">Activity Log</span>
    </div>
    <div class="logs-content" id="logs-content"></div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <span>Variables:</span>
      <span class="stat-value" id="stat-variables">0</span>
    </div>
    <div class="stat-item">
      <span>Requests:</span>
      <span class="stat-value" id="stat-requests">0</span>
    </div>
    <div class="stat-item">
      <span>Uptime:</span>
      <span class="stat-value" id="stat-uptime">--</span>
    </div>
  </div>

  <script>
    // ============================================================================
    // GLOBAL STATE
    // ============================================================================
    window.__figmaVariablesData = null;
    window.__figmaVariablesReady = false;
    window.__figmaComponentData = null;
    window.__figmaComponentRequests = new Map();
    window.__figmaPendingRequests = new Map();

    let requestIdCounter = 0;
    let connectedPort = null;
    let connectionStartTime = null;
    let requestCount = 0;

    // Port scanning
    const WS_PORT_RANGE_START = 9223;
    const WS_PORT_RANGE_END = 9232;
    let activeConnections = [];

    // ============================================================================
    // LOGGING
    // ============================================================================
    function log(message, type = 'info') {
      const logsContent = document.getElementById('logs-content');
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <span class="log-time">${time}</span>
        <span class="log-message ${type}">${message}</span>
      `;

      logsContent.appendChild(entry);
      logsContent.scrollTop = logsContent.scrollHeight;

      // Keep only last 100 entries
      while (logsContent.children.length > 100) {
        logsContent.removeChild(logsContent.firstChild);
      }
    }

    function clearLogs() {
      document.getElementById('logs-content').innerHTML = '';
      log('Logs cleared', 'info');
    }

    // ============================================================================
    // UI UPDATES
    // ============================================================================
    function updateConnectionUI(state, port = null) {
      const mainStatus = document.getElementById('main-status');
      const connectionStatus = document.getElementById('connection-status');
      const serverInfo = document.getElementById('server-info');
      const connectBtn = document.getElementById('connect-btn');
      const disconnectBtn = document.getElementById('btn-disconnect');
      const actionBtns = document.querySelectorAll('.action-btn');
      const runCodeBtn = document.getElementById('btn-run-code');

      mainStatus.className = 'status-indicator ' + state;
      connectedPort = port;

      switch (state) {
        case 'connected':
          connectionStatus.textContent = 'Connected';
          serverInfo.textContent = `localhost:${port}`;
          connectBtn.textContent = 'Connected';
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          actionBtns.forEach(btn => btn.disabled = false);
          runCodeBtn.disabled = false;
          connectionStartTime = Date.now();
          updateUptime();
          break;
        case 'loading':
          connectionStatus.textContent = 'Connecting...';
          serverInfo.textContent = `scanning ports...`;
          connectBtn.textContent = 'Connecting...';
          connectBtn.disabled = true;
          break;
        case 'error':
          connectionStatus.textContent = 'Error';
          serverInfo.textContent = 'Connection failed';
          connectBtn.textContent = 'Retry';
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          actionBtns.forEach(btn => btn.disabled = true);
          runCodeBtn.disabled = true;
          break;
        case 'disconnected':
        default:
          connectionStatus.textContent = 'Disconnected';
          serverInfo.textContent = 'Not connected';
          connectBtn.textContent = 'Connect';
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          actionBtns.forEach(btn => btn.disabled = true);
          runCodeBtn.disabled = true;
          connectionStartTime = null;
          break;
      }
    }

    function updateStats() {
      document.getElementById('stat-variables').textContent =
        window.__figmaVariablesData?.variables?.length || 0;
      document.getElementById('stat-requests').textContent = requestCount;
    }

    function updateUptime() {
      if (connectionStartTime) {
        const elapsed = Math.floor((Date.now() - connectionStartTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = elapsed % 60;
        document.getElementById('stat-uptime').textContent =
          mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
      }
    }

    setInterval(updateUptime, 1000);

    // ============================================================================
    // WEBSOCKET CONNECTION
    // ============================================================================
    function wsScanAndConnect() {
      const preferredPort = parseInt(document.getElementById('port-select').value, 10);
      log(`Scanning ports ${WS_PORT_RANGE_START}-${WS_PORT_RANGE_END}...`, 'info');
      updateConnectionUI('loading');

      let foundPorts = [];

      function tryPort(port) {
        return new Promise((resolve) => {
          const ws = new WebSocket('ws://localhost:' + port);

          const timeout = setTimeout(() => {
            ws.close();
            resolve(null);
          }, 500);

          ws.onopen = () => {
            clearTimeout(timeout);
            resolve({ ws, port });
          };

          ws.onerror = () => {
            clearTimeout(timeout);
            resolve(null);
          };
        });
      }

      async function scan() {
        // Try preferred port first
        let result = await tryPort(preferredPort);
        if (result) {
          foundPorts.push(result);
        } else {
          // Scan all ports
          for (let p = WS_PORT_RANGE_START; p <= WS_PORT_RANGE_END; p++) {
            if (p !== preferredPort) {
              result = await tryPort(p);
              if (result) foundPorts.push(result);
            }
          }
        }

        if (foundPorts.length > 0) {
          const { ws, port } = foundPorts[0];
          log(`Found server on port ${port}`, 'success');
          attachWsHandlers(ws, port);
          updateConnectionUI('connected', port);
        } else {
          log('No MCP server found. Start bridge_server.py first.', 'error');
          updateConnectionUI('error');
        }
      }

      scan();
    }

    function attachWsHandlers(ws, port) {
      ws.onmessage = function(event) {
        try {
          const message = JSON.parse(event.data);
          handleWsMessage(message, port);
        } catch (e) {
          log(`WS parse error: ${e.message}`, 'error');
        }
      };

      ws.onclose = function() {
        log(`Disconnected from port ${port}`, 'error');
        updateConnectionUI('disconnected');
        activeConnections = activeConnections.filter(c => c.port !== port);
      };

      ws.onerror = function() {
        log(`WebSocket error on port ${port}`, 'error');
      };

      activeConnections.push({ ws, port });
    }

    function handleWsMessage(message, port) {
      if (message.type === 'VARIABLES_DATA') {
        window.__figmaVariablesData = message.data;
        window.__figmaVariablesReady = true;
        updateStats();
        log(`Received ${message.data?.variables?.length || 0} variables`, 'success');
      } else if (message.id) {
        const request = window.__figmaPendingRequests.get(message.id);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (message.error) {
            request.reject(new Error(message.error));
            log(`Request failed: ${message.error}`, 'error');
          } else {
            request.resolve(message.result || message);
            log(`Request completed: ${request.type}`, 'success');
          }
          window.__figmaPendingRequests.delete(message.id);
        }
      }
    }

    function sendToWs(method, params = {}) {
      return new Promise((resolve, reject) => {
        if (activeConnections.length === 0) {
          reject(new Error('Not connected'));
          return;
        }

        const id = 'req_' + (++requestIdCounter) + '_' + Date.now();
        const timeout = setTimeout(() => {
          window.__figmaPendingRequests.delete(id);
          reject(new Error('Request timeout'));
        }, 30000);

        window.__figmaPendingRequests.set(id, { resolve, reject, timeoutId: timeout, type: method });

        const message = { id, method, params };
        activeConnections[0].ws.send(JSON.stringify(message));
        requestCount++;
        updateStats();
        log(`Sent: ${method}`, 'info');
      });
    }

    // ============================================================================
    // PLUGIN COMMAND INFRASTRUCTURE
    // ============================================================================
    window.sendPluginCommand = (type, params, timeoutMs) => {
      timeoutMs = timeoutMs || 15000;
      return new Promise((resolve, reject) => {
        const requestId = type.toLowerCase() + '_' + (++requestIdCounter) + '_' + Date.now();

        const timeoutId = setTimeout(() => {
          if (window.__figmaPendingRequests.has(requestId)) {
            window.__figmaPendingRequests.delete(requestId);
            reject(new Error(type + ' request timed out after ' + timeoutMs + 'ms'));
          }
        }, timeoutMs);

        window.__figmaPendingRequests.set(requestId, { resolve, reject, type, timeoutId });

        var message = { type: type, requestId: requestId };
        for (var key in params) {
          if (params.hasOwnProperty(key)) {
            message[key] = params[key];
          }
        }

        parent.postMessage({ pluginMessage: message }, '*');
        requestCount++;
        updateStats();
      });
    };

    // ============================================================================
    // COMMAND WRAPPERS
    // ============================================================================
    window.executeCode = (code, timeout) => {
      return sendToWs('EXECUTE_CODE', { code: code, timeout: timeout || 30000 });
    };

    window.refreshVariables = () => {
      return sendPluginCommand('REFRESH_VARIABLES', {});
    };

    window.getLocalComponents = () => {
      return sendPluginCommand('GET_LOCAL_COMPONENTS', {});
    };

    window.captureScreenshot = () => {
      return sendPluginCommand('CAPTURE_SCREENSHOT', {});
    };

    // ============================================================================
    // EVENT HANDLERS
    // ============================================================================
    document.getElementById('connect-btn').addEventListener('click', wsScanAndConnect);
    document.getElementById('scan-btn').addEventListener('click', wsScanAndConnect);

    document.getElementById('btn-disconnect').addEventListener('click', () => {
      activeConnections.forEach(c => {
        try { c.ws.close(); } catch (e) {}
      });
      activeConnections = [];
      updateConnectionUI('disconnected');
      log('Disconnected', 'info');
    });

    document.getElementById('btn-execute').addEventListener('click', () => {
      const code = document.getElementById('code-input').value.trim();
      if (code) {
        executeCode(code).then(result => {
          log(`Result: ${JSON.stringify(result).substring(0, 100)}...`, 'success');
        }).catch(err => {
          log(`Error: ${err.message}`, 'error');
        });
      }
    });

    document.getElementById('btn-refresh').addEventListener('click', () => {
      refreshVariables().then(result => {
        log('Variables refreshed', 'success');
      }).catch(err => {
        log(`Error: ${err.message}`, 'error');
      });
    });

    document.getElementById('btn-components').addEventListener('click', () => {
      getLocalComponents().then(result => {
        log(`Found ${result?.components?.length || 0} components`, 'success');
      }).catch(err => {
        log(`Error: ${err.message}`, 'error');
      });
    });

    document.getElementById('btn-screenshot').addEventListener('click', () => {
      captureScreenshot().then(result => {
        log('Screenshot captured', 'success');
      }).catch(err => {
        log(`Error: ${err.message}`, 'error');
      });
    });

    document.getElementById('btn-clear').addEventListener('click', clearLogs);

    document.getElementById('btn-run-code').addEventListener('click', () => {
      const code = document.getElementById('code-input').value.trim();
      if (code) {
        log('Executing code...', 'info');
        executeCode(code).then(result => {
          log(`Success: ${JSON.stringify(result, null, 2).substring(0, 200)}`, 'success');
        }).catch(err => {
          log(`Error: ${err.message}`, 'error');
        });
      }
    });

    // ============================================================================
    // MESSAGE HANDLER - Process responses from plugin worker
    // ============================================================================
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      const handleResult = (resultType, dataKey) => {
        const request = window.__figmaPendingRequests.get(msg.requestId);
        if (request) {
          if (request.timeoutId) clearTimeout(request.timeoutId);
          if (msg.success) {
            var result = { success: true };
            if (dataKey && msg[dataKey] !== undefined) result[dataKey] = msg[dataKey];
            if (msg.data !== undefined) result.data = msg.data;
            request.resolve(result);
            log(`${resultType} completed`, 'success');
          } else {
            request.reject(new Error(msg.error || 'Unknown error'));
            log(`${resultType} failed: ${msg.error}`, 'error');
          }
          window.__figmaPendingRequests.delete(msg.requestId);
        }
      };

      switch (msg.type) {
        case 'VARIABLES_DATA':
          window.__figmaVariablesData = msg.data;
          window.__figmaVariablesReady = true;
          updateStats();
          log(`${msg.data?.variables?.length || 0} variables loaded`, 'success');
          break;
        case 'EXECUTE_CODE_RESULT':
          handleResult('Execute Code', 'result');
          break;
        case 'REFRESH_VARIABLES_RESULT':
          handleResult('Refresh Variables', null);
          break;
        case 'GET_LOCAL_COMPONENTS_RESULT':
          handleResult('Get Components', null);
          break;
        case 'CAPTURE_SCREENSHOT_RESULT':
          handleResult('Screenshot', 'image');
          break;
        case 'ERROR':
          log(`Plugin error: ${msg.error}`, 'error');
          break;
      }
    };

    // ============================================================================
    // INITIALIZATION
    // ============================================================================
    log('Desktop Bridge initialized', 'info');
    log('Click "Connect" or "Scan" to find MCP server', 'info');
    updateStats();
  </script>
</body>
</html>
