<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figma Tools Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 2.5rem; margin-bottom: 0.25rem; background: linear-gradient(90deg, #7fd962, #39bae6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #666; margin-bottom: 2rem; }

    .section { margin-bottom: 2rem; }
    .section-title { font-size: 1.25rem; margin-bottom: 1rem; color: #39bae6; display: flex; align-items: center; gap: 0.5rem; }
    .section-title::before { content: ''; width: 4px; height: 1.25rem; background: #39bae6; border-radius: 2px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem;
      transition: all 0.2s ease;
    }
    .card:hover { border-color: rgba(57,186,230,0.3); background: rgba(255,255,255,0.05); }
    .card-title { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value { font-size: 2rem; font-weight: 700; margin: 0.5rem 0; }
    .card-value.green { color: #7fd962; }
    .card-value.blue { color: #39bae6; }
    .card-value.yellow { color: #e6b450; }
    .card-value.red { color: #f07178; }
    .card-subtitle { font-size: 0.8rem; color: #555; }

    /* Checklist styles */
    .checklist { display: flex; flex-direction: column; gap: 0.75rem; }
    .checklist-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s ease;
    }
    .checklist-item:hover { border-color: rgba(57,186,230,0.3); background: rgba(255,255,255,0.05); }
    .checklist-item.verified { border-color: rgba(127,217,98,0.3); }

    .check-toggle {
      width: 22px; height: 22px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .check-toggle.checked { background: #7fd962; border-color: #7fd962; }
    .check-toggle.checked::after { content: '✓'; color: #0f0f1a; font-size: 0.8rem; font-weight: 700; }

    .checklist-info { flex: 1; }
    .checklist-label { font-size: 0.95rem; font-weight: 500; }
    .checklist-cmd { font-size: 0.75rem; color: #555; font-family: monospace; margin-top: 0.25rem; }

    .copy-btn {
      background: rgba(57,186,230,0.1);
      border: 1px solid rgba(57,186,230,0.3);
      color: #39bae6;
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(57,186,230,0.2); }
    .copy-btn.copied { background: rgba(127,217,98,0.15); border-color: rgba(127,217,98,0.3); color: #7fd962; }

    /* Quick action card */
    .action-card {
      background: linear-gradient(135deg, rgba(57,186,230,0.08), rgba(127,217,98,0.08));
      border: 1px solid rgba(57,186,230,0.2);
      border-radius: 12px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    .action-card:hover { border-color: rgba(57,186,230,0.5); transform: translateY(-1px); }
    .action-card .action-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .action-card .action-label { font-size: 1rem; font-weight: 600; color: #39bae6; }
    .action-card .action-desc { font-size: 0.8rem; color: #555; margin-top: 0.25rem; }

    /* Terminal placeholder */
    .terminal-placeholder {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 2rem;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: monospace;
      font-size: 0.9rem;
    }

    .status-summary {
      display: flex; gap: 1.5rem; margin-bottom: 2rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .status-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.green { background: #7fd962; }
    .status-dot.yellow { background: #e6b450; }
    .status-dot.red { background: #f07178; }

    .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .footer { margin-top: 3rem; text-align: center; color: #444; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Figma Tools</h1>
    <p class="subtitle">Setup &amp; Orchestration Dashboard</p>

    <div class="status-summary">
      <div class="status-item">
        <div class="status-dot" id="summary-dot"></div>
        <span id="summary-text">Checking setup...</span>
      </div>
      <div class="status-item" style="margin-left: auto; color: #555;">
        <span id="verified-count">0</span>/4 verified
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section">
          <h2 class="section-title">Setup Checklist</h2>
          <div class="checklist" id="checklist"></div>
        </div>

        <div class="section">
          <h2 class="section-title">Terminal Output</h2>
          <div class="terminal-placeholder" id="terminal-output">
            Terminal output will appear here when commands are run...
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <h2 class="section-title">Quick Actions</h2>
          <div style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="action-card" id="preflight-btn">
              <div class="action-icon">🚀</div>
              <div class="action-label">Run Preflight</div>
              <div class="action-desc">Copy preflight command to clipboard</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Figma Tools Dashboard &bull; OpenCode</div>
  </div>

  <script>
    const STORAGE_KEY = 'figma-tools-checklist';

    const checklistItems = [
      {
        id: 'node',
        label: 'Node.js installed',
        cmd: 'node --version',
        desc: 'Required runtime for Figma MCP tools'
      },
      {
        id: 'figma-cli',
        label: 'Figma CLI installed',
        cmd: 'npx @anthropic-ai/figma-developer-mcp --version 2>/dev/null || echo "Not installed"',
        desc: 'Figma Developer MCP package'
      },
      {
        id: 'figma-connected',
        label: 'Figma connected',
        cmd: 'echo $FIGMA_PERSONAL_ACCESS_TOKEN | head -c4',
        desc: 'Personal access token configured'
      },
      {
        id: 'mcp-configured',
        label: 'MCP server configured',
        cmd: 'cat ~/.claude/claude_desktop_config.json 2>/dev/null | grep -c figma || echo 0',
        desc: 'MCP server entry in Claude config'
      }
    ];

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(function() {
        var prev = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = prev;
          btn.classList.remove('copied');
        }, 1500);
      });
    }

    function updateSummary() {
      var state = loadState();
      var count = checklistItems.filter(function(item) { return state[item.id]; }).length;
      var dot = document.getElementById('summary-dot');
      var text = document.getElementById('summary-text');
      var countEl = document.getElementById('verified-count');

      countEl.textContent = count;

      if (count === checklistItems.length) {
        dot.className = 'status-dot green';
        text.textContent = 'All checks verified';
      } else if (count > 0) {
        dot.className = 'status-dot yellow';
        text.textContent = 'Partially configured';
      } else {
        dot.className = 'status-dot red';
        text.textContent = 'Setup required';
      }
    }

    function renderChecklist() {
      var container = document.getElementById('checklist');
      var state = loadState();
      container.innerHTML = '';

      checklistItems.forEach(function(item) {
        var verified = !!state[item.id];
        var row = document.createElement('div');
        row.className = 'checklist-item' + (verified ? ' verified' : '');

        var toggle = document.createElement('div');
        toggle.className = 'check-toggle' + (verified ? ' checked' : '');
        toggle.title = 'Toggle verified';
        toggle.addEventListener('click', function() {
          var s = loadState();
          s[item.id] = !s[item.id];
          saveState(s);
          renderChecklist();
          updateSummary();
        });

        var info = document.createElement('div');
        info.className = 'checklist-info';
        info.innerHTML = '<div class="checklist-label">' + item.label + '</div>' +
          '<div class="checklist-cmd">' + item.cmd + '</div>';

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy cmd';
        btn.addEventListener('click', function() { copyToClipboard(item.cmd, btn); });

        row.appendChild(toggle);
        row.appendChild(info);
        row.appendChild(btn);
        container.appendChild(row);
      });
    }

    document.getElementById('preflight-btn').addEventListener('click', function() {
      var cmd = 'node --version && npx @anthropic-ai/figma-developer-mcp --version 2>/dev/null && echo "FIGMA_TOKEN set: $(test -n \\"$FIGMA_PERSONAL_ACCESS_TOKEN\\" && echo yes || echo no)"';
      var desc = this.querySelector('.action-desc');
      navigator.clipboard.writeText(cmd).then(function() {
        desc.textContent = 'Copied to clipboard!';
        setTimeout(function() { desc.textContent = 'Copy preflight command to clipboard'; }, 1500);
      });
    });

    renderChecklist();
    updateSummary();
  </script>
</body>
</html>
